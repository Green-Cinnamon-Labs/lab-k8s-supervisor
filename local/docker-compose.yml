# docker compose up        — sobe planta + IHM
# docker compose up -d     — sobe em background
# docker compose down      — para tudo
#
# O Kind (plc-operator) continua sendo gerenciado pelo setup.sh,
# porque é um cluster Kubernetes e não um container simples.

services:
  te-plant:
    image: te-plant:latest
    container_name: te-plant
    ports:
      - "50051:50051"
    environment:
      - STEP_DELAY_MS=36    # 100x real time — 1h simulada = 36s de relógio
      # - ACTIVE_IDV=4      # ativar distúrbios: descomente e liste IDVs separados por vírgula

  tep-ihm:
    image: tep-ihm:latest
    container_name: tep-ihm
    ports:
      - "8080:8080"
    environment:
      - PLANT_ADDRESS=te-plant:50051
      - K8S_SERVER=https://host.docker.internal:6443
      - RECORD_CSV=true
      - RECORD_CSV_PATH=/data/recording.csv
      - ACTIVE_IDV=    # deve ser igual ao ACTIVE_IDV da te-plant
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
      - ./data:/data
    depends_on:
      - te-plant
