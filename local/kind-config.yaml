# Kind cluster config para o lab TEP local.
# Cluster name: tep-lab
#
# A planta roda fora do Kind (Docker standalone).
# O operator roda dentro do Kind e conecta na planta via host.docker.internal.
#
# Uso: kind create cluster --config kind-config.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: tep-lab
nodes:
  - role: control-plane
